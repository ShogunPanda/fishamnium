theme: light

prompt: default
prompt_narrow: compact
prompt_narrow_threshold: 100

# One Light / Dark modified
colors:
  light:
    white: "FFFFFF"
    black: "000000"
    lightgreen: "00CC00"
    yellow: "FFDF00"
    magenta: "C800E2"
    blue: "005be4"
    gray: "808080"
    lightgray: "C0C0C0"
    red: "CC0000"
    green: "008800"
    cyan: "0088E2"
    orange: "F83B19"
    foreground: "000000"
    primary: "0088E2"
    secondary: "C800E2"
  dark:
    white: "FFFFFF"
    black: "000000"
    lightgreen: "00CC00"
    yellow: "FFDF00"
    magenta: "C800E2"
    blue: "005be4"
    gray: "808080"
    lightgray: "C0C0C0"
    red: "EE0000"
    green: "00EE00"
    cyan: "5EBBF9"
    orange: "F75F19"
    foreground: "FFFFFF"
    primary: "FFDF00"
    secondary: "5EBBF9"

themes:
  minimal:
    user:
      regular: "hex:008800"
      root: "hex:cc0000"
    template: "<bold user_fg>\uE0B6<user_bg hex:ffffff> \uEF09 {host} {git_status} <bg_reset><user_fg>\uE0B0 "
  compact:
    user:
      regular: "hex:008800"
      root: "hex:cc0000"
    template: "<bold user_fg>\uE0B6<user_bg hex:ffffff> \uF007 {user} <bg_hex:ffdf00 user_fg>\uE0B4<hex:000000> \uEF09 {host} {git_status} <bg_reset><hex:ffdf00>\uE0B0 "
  default:
    user:
      regular: "hex:008800 bold"
      root: "hex:cc0000 bold"
    template: "<bold user_fg>\uE0B6<user_bg hex:ffffff> \uF007 {user} <bg_hex:ffdf00 user_fg>\uE0B4<hex:000000> \uEF09 {host} \uF114 {path} \uE0A0 {git_branch} {git_status}<bg_reset><hex:ffdf00>\uE0B0 "
  extended:
    user:
      regular: "hex:008800 bold"
      root: "hex:cc0000 bold"
    template:
      - ""
      - "<bold fg_hex:013482>\uE0B6<hex:ffffff bg_hex:013482> \uE384 {time} <bg_hex:0088e2 hex:013482>\uE0B4<hex:ffffff> \uF114 {path} \uE0A0 {git_branch} {git_hash} {git_status}<bg_reset><hex:0088e2>\uE0B4"
      - "<bold user_fg>\uE0B6<user_bg hex:ffffff> \uF007 {user} <bg_hex:ffdf00 user_fg>\uE0B4<hex:000000> \uEF09 {host} <bg_reset><hex:ffdf00>\uE0B0 "
  full:
    user:
      regular: "hex:008800 bold"
      root: "hex:cc0000 bold"
    template:
      - ""
      - "<bold fg_hex:013482>\uE0B6<hex:ffffff bg_hex:013482> \uE384 {time} <bg_hex:0088e2 hex:013482>\uE0B4<hex:ffffff> \uF114 {path} \uE0A0 {git_branch} {git_hash} {git_status}<bg_reset><hex:0088e2>\uE0B4"
      - "<bold user_fg>\uE0B6<user_bg hex:ffffff> \uF007 {user} <bg_hex:ffdf00 user_fg>\uE0B4<hex:000000> \uEF09 {host}{app: \uF013}{node}{rust}{ruby}{go} <bg_reset><hex:ffdf00>\uE0B0 "

